<!DOCTYPE html>
<html>
<head>
    <title>My PDF App</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>

<h2>My PDF Reader</h2>

<select id="fileSelect">
    <option value="file1.pdf">File 1</option>
    <option value="file2.pdf">File 2</option>
</select>

<br><br>

<canvas id="pdfCanvas"></canvas>

<br><br>

<input type="text" id="searchBox" placeholder="Search text">
<button onclick="searchText()">Search</button>

<p id="searchResult"></p>

<br>

<input type="number" id="startPage" placeholder="Start Page">
<input type="number" id="endPage" placeholder="End Page">
<button onclick="readPages()">Read Pages</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="script.js"></script>

</body>
</html>
